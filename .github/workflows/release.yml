name: release

on:
  push:
    tags:
      - 'rel-*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Existing rel-* tag to package'
        required: true
        type: string

permissions:
  contents: write

env:
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}
  RELEASE_NOTES: CHANGES.20260713.md

jobs:
  linux:
    name: linux gcc release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref }}
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build pkg-config libsdl2-dev libarchive-dev gcc g++
      - name: Configure
        run: cmake --preset linux-ci-gcc
      - name: Build
        run: cmake --build --preset linux-ci-gcc
      - name: Smoke
        run: SDL_VIDEODRIVER=dummy SDL_AUDIODRIVER=dummy ./build/linux-ci-gcc/sdl2/vaeg --smoke
      - name: Unit tests
        run: ctest --test-dir build/linux-ci-gcc --output-on-failure
      - name: Package
        run: |
          set -euo pipefail
          release_id="${RELEASE_TAG//-/}"
          package="vaeg-${release_id}-linux-x86_64"
          asset="${package}.tar.gz"
          rm -rf dist-package "${asset}"
          mkdir -p "dist-package/${package}/assets"
          install -m 755 build/linux-ci-gcc/sdl2/vaeg "dist-package/${package}/vaeg"
          install -m 644 assets/OFL.txt "dist-package/${package}/assets/"
          install -m 644 assets/NOTICE.md "dist-package/${package}/assets/"
          install -m 644 CHANGES.20260713.md "dist-package/${package}/"
          install -m 644 dist/readme-dist.txt "dist-package/${package}/README-dist.txt"
          tar -C dist-package -czf "${asset}" "${package}"
          tar -tzf "${asset}"
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release edit "${RELEASE_TAG}" \
              --title "88VA Eternal Grafx ${RELEASE_TAG}" \
              --notes-file "${RELEASE_NOTES}"
          else
            gh release create "${RELEASE_TAG}" \
              --verify-tag \
              --title "88VA Eternal Grafx ${RELEASE_TAG}" \
              --notes-file "${RELEASE_NOTES}"
          fi
      - name: Upload release asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          release_id="${RELEASE_TAG//-/}"
          gh release upload "${RELEASE_TAG}" \
            "vaeg-${release_id}-linux-x86_64.tar.gz" \
            --clobber

  windows:
    name: windows mingw native static-runtime
    runs-on: windows-latest
    needs: linux
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref }}
      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            git
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-pkgconf
      - name: Configure
        run: cmake --preset mingw-ci
      - name: Build
        run: cmake --build --preset mingw-ci
      - name: Smoke
        run: SDL_VIDEODRIVER=dummy SDL_AUDIODRIVER=dummy ./build/mingw-ci/sdl2/vaeg.exe --smoke
      - name: Unit tests
        run: ctest --test-dir build/mingw-ci --output-on-failure
      - name: Verify Windows runtime imports
        run: |
          set -euo pipefail
          objdump -p build/mingw-ci/sdl2/vaeg.exe |
            awk '/DLL Name:/ {print $3}' | tee imports.txt
          if grep -E 'SDL2\.dll|libgcc_s_seh-1\.dll|libstdc\+\+-6\.dll|libwinpthread-1\.dll' imports.txt; then
            echo "unexpected SDL2 or MinGW runtime DLL import" >&2
            exit 1
          fi
          bad=0
          while IFS= read -r dll; do
            lower="$(printf '%s' "${dll}" | tr '[:upper:]' '[:lower:]')"
            case "${lower}" in
              kernel32.dll|msvcrt.dll|user32.dll|gdi32.dll|advapi32.dll|shell32.dll|ole32.dll|oleaut32.dll|imm32.dll|version.dll|winmm.dll|setupapi.dll|uuid.dll|ws2_32.dll|bcrypt.dll|crypt32.dll|comdlg32.dll|comctl32.dll|shlwapi.dll|rpcrt4.dll|dwmapi.dll|hid.dll|cfgmgr32.dll|api-ms-win-*.dll|ext-ms-*.dll)
                ;;
              *)
                echo "unexpected non-system DLL import: ${dll}" >&2
                bad=1
                ;;
            esac
          done < imports.txt
          exit "${bad}"
      - name: Stage package
        run: |
          set -euo pipefail
          release_id="${RELEASE_TAG//-/}"
          package="vaeg-${release_id}-win-x86_64"
          rm -rf dist-package
          mkdir -p "dist-package/${package}/assets"
          cp build/mingw-ci/sdl2/vaeg.exe "dist-package/${package}/"
          cp assets/OFL.txt "dist-package/${package}/assets/"
          cp assets/NOTICE.md "dist-package/${package}/assets/"
          cp CHANGES.20260713.md "dist-package/${package}/"
          cp dist/readme-dist.txt "dist-package/${package}/README-dist.txt"
          find "dist-package/${package}" -type f | sort
      - name: Zip package
        shell: pwsh
        run: |
          $releaseId = $env:RELEASE_TAG -replace '-', ''
          $package = "vaeg-$releaseId-win-x86_64"
          $asset = "$package.zip"
          if (Test-Path $asset) {
            Remove-Item $asset
          }
          Compress-Archive -Path "dist-package/$package" -DestinationPath $asset -Force
      - name: Upload release asset
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $releaseId = $env:RELEASE_TAG -replace '-', ''
          gh release upload $env:RELEASE_TAG "vaeg-$releaseId-win-x86_64.zip" --clobber

  macos:
    name: macos fetch-sdl2 release
    runs-on: macos-14
    needs: linux
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref }}
      - name: Install build tools
        run: brew install cmake ninja
      - name: Configure
        run: cmake --preset macos-ci
      - name: Build
        run: cmake --build --preset macos-ci
      - name: Smoke
        run: SDL_VIDEODRIVER=dummy SDL_AUDIODRIVER=dummy ./build/macos-ci/sdl2/vaeg --smoke
      - name: Unit tests
        run: ctest --test-dir build/macos-ci --output-on-failure
      - name: Package
        run: |
          set -euo pipefail
          file build/macos-ci/sdl2/vaeg | tee vaeg-file.txt
          grep -q 'arm64' vaeg-file.txt
          release_id="${RELEASE_TAG//-/}"
          package="vaeg-${release_id}-macos-arm64"
          asset="${package}.tar.gz"
          rm -rf dist-package "${asset}"
          mkdir -p "dist-package/${package}/assets"
          install -m 755 build/macos-ci/sdl2/vaeg "dist-package/${package}/vaeg"
          install -m 644 assets/OFL.txt "dist-package/${package}/assets/"
          install -m 644 assets/NOTICE.md "dist-package/${package}/assets/"
          install -m 644 CHANGES.20260713.md "dist-package/${package}/"
          install -m 644 dist/readme-dist.txt "dist-package/${package}/README-dist.txt"

          if otool -L "dist-package/${package}/vaeg" | grep -E 'libSDL2.*dylib'; then
            echo "unexpected dynamic SDL2 dependency" >&2
            exit 1
          fi

          otool -L "dist-package/${package}/vaeg"
          find "dist-package/${package}" -type f | sort
          tar -C dist-package -czf "${asset}" "${package}"
          tar -tzf "${asset}"
      - name: Upload release asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          release_id="${RELEASE_TAG//-/}"
          gh release upload "${RELEASE_TAG}" \
            "vaeg-${release_id}-macos-arm64.tar.gz" \
            --clobber
