name: build

on:
  push:
  pull_request:

# CI intentionally has no ROMs or disk images. The smoke test therefore
# runs reduced-scope when ROMs are absent: SDL init, core loop, one GUI
# frame, and clean exit. Human gates remain the behavioral ROM/disk check.

jobs:
  lint:
    name: repo invariants
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check encoding
        run: python3 tools/repo/check_encoding.py --expect utf8 --exclude hlp/
      - name: Check EOL
        run: python3 tools/repo/check_eol.py --enforce
      - name: Check path case
        run: python3 tools/repo/check_case.py

  linux:
    name: ubuntu ${{ matrix.compiler }} ${{ matrix.core }} z80
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - compiler: gcc
            preset: linux-ci-gcc
            core: legacy
          - compiler: gcc
            preset: linux-ci-gcc
            core: suzukiplan
          - compiler: clang
            preset: linux-ci-clang
            core: legacy
          - compiler: clang
            preset: linux-ci-clang
            core: suzukiplan
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build pkg-config libsdl2-dev gcc g++ clang
      - name: Configure
        run: >-
          cmake --preset ${{ matrix.preset }}
          -DVAEG_Z80_CORE=${{ matrix.core }}
      - name: Build
        run: cmake --build --preset ${{ matrix.preset }}
      - name: Smoke
        run: SDL_VIDEODRIVER=dummy SDL_AUDIODRIVER=dummy ./build/${{ matrix.preset }}/sdl2/vaeg --smoke
      - name: Unit tests
        run: ctest --test-dir build/${{ matrix.preset }} --output-on-failure
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vaeg-linux-${{ matrix.compiler }}-${{ matrix.core }}-z80
          path: build/${{ matrix.preset }}/sdl2/vaeg

  z80-conformance:
    name: standalone z80 conformance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build pkg-config libsdl2-dev gcc g++
      - name: Cache external ZEX inputs
        uses: actions/cache@v4
        with:
          path: build/zex-cache
          key: zex-e3926769-b3015112-fbb1bb5d
      - name: Acquire and verify external ZEX inputs
        run: python3 tests/z80/fetch_zex.py --output-dir build/zex-cache
      - name: Configure standalone conformance
        run: >-
          cmake --preset linux-ci-gcc
          -DVAEG_ZEX_ARTIFACT_DIR=${{ github.workspace }}/build/zex-cache
      - name: Build standalone conformance
        run: >-
          cmake --build --preset linux-ci-gcc --target
          vaeg_z80_header_default
          vaeg_z80_header_no_functional
          vaeg_z80_header_debug_default
          vaeg_z80_header_release
          vaeg_z80_interrupt_default
          vaeg_z80_interrupt_no_functional
          vaeg_z80_zex_runner
          vaeg_z80_wrapper_default
          vaeg_z80_wrapper_no_functional_test
          vaeg_z80_wrapper_zex_runner
          vaeg_z80_legacy_trace
          vaeg_z80_new_trace
          vaeg_z80_trace_compare
      - name: Run standalone conformance
        run: >-
          ctest --test-dir build/linux-ci-gcc --output-on-failure
          -R '^vaeg_z80_(header|interrupt|wrapper|zex|differential)'
      - name: Verify source archive excludes external ZEX inputs
        run: |
          git archive --format=tar.gz --output=/tmp/vaeg-source.tar.gz HEAD
          python3 tests/z80/check_zex_archive.py /tmp/vaeg-source.tar.gz

  linux-asan:
    name: ubuntu asan ${{ matrix.core }} z80
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        core: [legacy, suzukiplan]
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build pkg-config libsdl2-dev gcc g++
      - name: Configure
        run: >-
          cmake --preset linux-ci-asan
          -DVAEG_Z80_CORE=${{ matrix.core }}
      - name: Build
        run: cmake --build --preset linux-ci-asan
      - name: Smoke
        run: |
          # UBSan reports for the documented backlog are expected output.
          # Sanitizer failures still fail this step through the process exit.
          SDL_VIDEODRIVER=dummy SDL_AUDIODRIVER=dummy ASAN_OPTIONS=detect_leaks=0 \
            ./build/linux-ci-asan/sdl2/vaeg --smoke
      - name: Unit tests
        run: |
          SDL_VIDEODRIVER=dummy SDL_AUDIODRIVER=dummy ASAN_OPTIONS=detect_leaks=0 \
            ctest --test-dir build/linux-ci-asan --output-on-failure

  windows:
    name: windows msys2 mingw64 ${{ matrix.core }} z80
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        core: [legacy, suzukiplan]
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4
      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          # MSYS2 package names can drift; keep this list explicit so failures
          # identify dependency churn rather than hiding behind a meta package.
          install: >-
            git
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-pkgconf
      - name: Configure
        run: >-
          cmake --preset mingw-ci
          -DVAEG_Z80_CORE=${{ matrix.core }}
      - name: Build
        run: cmake --build --preset mingw-ci
      - name: Smoke
        run: SDL_VIDEODRIVER=dummy SDL_AUDIODRIVER=dummy ./build/mingw-ci/sdl2/vaeg.exe --smoke
      - name: Unit tests
        run: ctest --test-dir build/mingw-ci --output-on-failure
      - name: Verify Windows runtime imports
        run: |
          objdump -p build/mingw-ci/sdl2/vaeg.exe | grep 'DLL Name'
          if objdump -p build/mingw-ci/sdl2/vaeg.exe | grep -E 'SDL2\.dll|libgcc_s_seh-1\.dll|libstdc\+\+-6\.dll|libwinpthread-1\.dll'; then
            echo "unexpected SDL2 or MinGW runtime DLL import" >&2
            exit 1
          fi
      - name: Stage artifact
        run: |
          # vaeg.exe embeds the GUI font and statically links SDL2 plus
          # the MinGW gcc/libstdc++/winpthread runtimes.
          mkdir -p build/mingw-ci/artifact
          cp build/mingw-ci/sdl2/vaeg.exe build/mingw-ci/artifact/
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vaeg-windows-mingw64-${{ matrix.core }}-z80
          path: build/mingw-ci/artifact/

  macos:
    name: macos fetch-sdl2 ${{ matrix.core }} z80
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        core: [legacy, suzukiplan]
    steps:
      - uses: actions/checkout@v4
      - name: Install build tools
        run: brew install cmake ninja
      - name: Configure
        run: |
          # Maintainer baseline is MacPorts, but MacPorts is impractical on
          # hosted runners. CI uses pinned FetchContent SDL2 and links it
          # statically through macos-ci, as recorded in ADR-0006.
          cmake --preset macos-ci -DVAEG_Z80_CORE=${{ matrix.core }}
      - name: Build
        run: |
          set +e
          cmake --build --preset macos-ci >macos-build.log 2>&1
          status=$?
          cat macos-build.log
          if test "${status}" -ne 0; then
            tail -n 60 macos-build.log |
              while IFS= read -r line; do
                echo "::error title=macOS build log::${line}"
              done
          fi
          exit "${status}"
      - name: Smoke
        run: SDL_VIDEODRIVER=dummy SDL_AUDIODRIVER=dummy ./build/macos-ci/sdl2/vaeg --smoke
      - name: Unit tests
        run: ctest --test-dir build/macos-ci --output-on-failure
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vaeg-macos-${{ matrix.core }}-z80
          path: build/macos-ci/sdl2/vaeg
