name: build

on:
  push:
  pull_request:

# CI intentionally has no ROMs or disk images. The smoke test therefore
# runs reduced-scope when ROMs are absent: SDL init, core loop, one GUI
# frame, and clean exit. Human gates remain the behavioral ROM/disk check.

jobs:
  lint:
    name: repo invariants
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check encoding
        run: python3 tools/repo/check_encoding.py --expect utf8 --exclude hlp/
      - name: Check EOL
        run: python3 tools/repo/check_eol.py --enforce
      - name: Check path case
        run: python3 tools/repo/check_case.py

  linux:
    name: ubuntu ${{ matrix.compiler }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - compiler: gcc
            preset: linux-ci-gcc
          - compiler: clang
            preset: linux-ci-clang
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build pkg-config libsdl2-dev gcc g++ clang
      - name: Configure
        run: cmake --preset ${{ matrix.preset }}
      - name: Build
        run: cmake --build --preset ${{ matrix.preset }}
      - name: Smoke
        run: SDL_VIDEODRIVER=dummy SDL_AUDIODRIVER=dummy ./build/${{ matrix.preset }}/sdl2/vaeg --smoke
      - name: Unit tests
        run: ctest --test-dir build/${{ matrix.preset }} --output-on-failure
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vaeg-linux-${{ matrix.compiler }}
          path: build/${{ matrix.preset }}/sdl2/vaeg

  linux-asan:
    name: ubuntu asan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build pkg-config libsdl2-dev gcc g++
      - name: Configure
        run: cmake --preset linux-ci-asan
      - name: Build
        run: cmake --build --preset linux-ci-asan
      - name: Smoke
        run: |
          # UBSan reports for the documented backlog are expected output.
          # Sanitizer failures still fail this step through the process exit.
          SDL_VIDEODRIVER=dummy SDL_AUDIODRIVER=dummy ASAN_OPTIONS=detect_leaks=0 \
            ./build/linux-ci-asan/sdl2/vaeg --smoke
      - name: Unit tests
        run: |
          SDL_VIDEODRIVER=dummy SDL_AUDIODRIVER=dummy ASAN_OPTIONS=detect_leaks=0 \
            ctest --test-dir build/linux-ci-asan --output-on-failure

  windows:
    name: windows msys2 mingw64
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4
      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          # MSYS2 package names can drift; keep this list explicit so failures
          # identify dependency churn rather than hiding behind a meta package.
          install: >-
            git
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-pkgconf
      - name: Configure
        run: cmake --preset mingw-ci
      - name: Build
        run: cmake --build --preset mingw-ci
      - name: Smoke
        run: SDL_VIDEODRIVER=dummy SDL_AUDIODRIVER=dummy ./build/mingw-ci/sdl2/vaeg.exe --smoke
      - name: Unit tests
        run: ctest --test-dir build/mingw-ci --output-on-failure
      - name: Verify Windows runtime imports
        run: |
          objdump -p build/mingw-ci/sdl2/vaeg.exe | grep 'DLL Name'
          if objdump -p build/mingw-ci/sdl2/vaeg.exe | grep -E 'SDL2\.dll|libgcc_s_seh-1\.dll|libstdc\+\+-6\.dll|libwinpthread-1\.dll'; then
            echo "unexpected SDL2 or MinGW runtime DLL import" >&2
            exit 1
          fi
      - name: Stage artifact
        run: |
          # vaeg.exe embeds the GUI font and statically links SDL2 plus
          # the MinGW gcc/libstdc++/winpthread runtimes.
          mkdir -p build/mingw-ci/artifact
          cp build/mingw-ci/sdl2/vaeg.exe build/mingw-ci/artifact/
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vaeg-windows-mingw64
          path: build/mingw-ci/artifact/

  macos:
    name: macos fetch-sdl2
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install build tools
        run: brew install cmake ninja
      - name: Configure
        run: |
          # Maintainer baseline is MacPorts, but MacPorts is impractical on
          # hosted runners. CI uses pinned FetchContent SDL2 and links it
          # statically through macos-ci, as recorded in ADR-0006.
          cmake --preset macos-ci
      - name: Build
        run: cmake --build --preset macos-ci
      - name: Smoke
        run: SDL_VIDEODRIVER=dummy SDL_AUDIODRIVER=dummy ./build/macos-ci/sdl2/vaeg --smoke
      - name: Unit tests
        run: ctest --test-dir build/macos-ci --output-on-failure
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vaeg-macos
          path: build/macos-ci/sdl2/vaeg
